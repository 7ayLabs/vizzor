name: Feature Request
description: Suggest a feature for Vizzor
labels: ["enhancement"]
body:
  - type: textarea
    id: description
    attributes:
      label: Feature Description
      description: A clear description of the feature you'd like
    validations:
      required: true
  - type: textarea
    id: use-case
    attributes:
      label: Use Case
      description: Why is this feature needed? What problem does it solve?
    validations:
      required: true
  - type: dropdown
    id: module
    attributes:
      label: Module
      options:
        - Scanner
        - Trends
        - Forensics
        - CLI
        - Discord Bot
        - Telegram Bot
        - Chain Adapters
        - AI Integration
        - Other
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Any alternative solutions or features you've considered
