name: "Vizzor CodeQL Config"

# Exclude paths with intentional sensitive data display patterns.
# src/cli/commands/api.ts: One-time API key display (key cannot be retrieved after creation).
paths-ignore:
  - src/cli/commands/api.ts

# Load custom queries that extend built-in rate-limiting recognition
# to cover @fastify/rate-limit (CodeQL only ships the deprecated name).
packs:
  - ./.github/codeql/custom-queries
