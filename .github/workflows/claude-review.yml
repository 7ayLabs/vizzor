name: Claude PR Review

on:
  pull_request_review_comment:
    types: [created]
  issue_comment:
    types: [created]

permissions:
  contents: read
  pull-requests: write
  issues: write
  id-token: write

jobs:
  review:
    name: Claude Code Review
    runs-on: ubuntu-latest
    if: |
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'issue_comment' && github.event.issue.pull_request && contains(github.event.comment.body, '@claude'))

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Claude Review
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}

          direct_prompt: |
            You are a senior blockchain engineer reviewing PRs for Vizzor — an AI-powered
            crypto chronovisor CLI + bot by 7ayLabs. The stack is TypeScript strict mode,
            ESM, Ink/React TUI, multi-provider AI (Anthropic/OpenAI/Gemini/Ollama), viem
            chain adapters, and SQLite cache.

            Review this PR targeting `${{ github.base_ref }}` with these priorities:

            **1. On-Chain Data Integrity**
            - ChainAdapter interface compliance
            - Correct handling of bigint values and wei/ether conversions
            - Safe contract interaction patterns (no unchecked casts)

            **2. Security**
            - No hardcoded API keys, secrets, or credentials in source
            - No command injection in CLI commands
            - Safe user input handling for addresses and contract calls
            - Proper error boundaries (no leaked stack traces to users)

            **3. API & Data Quality**
            - Rate limit awareness for external APIs (CoinGecko, Binance, DexScreener, GoPlus)
            - Graceful degradation when APIs are unavailable
            - Cache TTL correctness for market data vs static data
            - Data source attribution (never present stale data as live)

            **4. Code Quality**
            - TypeScript strict compliance (no `any`, use `unknown` + narrowing)
            - ESM imports with `.js` extensions
            - `type` imports where applicable
            - No unused imports or dead code
            - Conventional commit scope accuracy

            **5. Testing**
            - New features should have unit tests
            - Mocked external APIs (no real network calls in tests)
            - Edge cases: API failures, malformed responses, empty data

            **6. Branch-Specific Standards**
            - `develop`: Focus on code quality and maintainability
            - `testing`: Verify stability and backward compatibility
            - `main`: Strict review — production readiness, no regressions

            Use inline comments for specific code issues.
            Provide a summary with approval/changes-requested verdict.
            Be concise — max 3-5 key points in the summary.

          allowed_tools: |
            [
              "Bash",
              "Glob",
              "Grep",
              "Read",
              "Edit",
              "Write"
            ]
