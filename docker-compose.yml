services:
  vizzor-api:
    build: .
    command: ["node", "dist/index.js", "serve", "--port", "3000", "--auth"]
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_TYPE: postgres
      DATABASE_URL: postgres://vizzor:vizzor_secure_pass@postgres:5432/vizzor
      ML_ENABLED: "true"
      ML_SIDECAR_URL: http://ml-sidecar:8000
      NODE_ENV: production
    restart: unless-stopped

  ml-sidecar:
    build: ./ml-sidecar
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://vizzor:vizzor_secure_pass@postgres:5432/vizzor
      MODEL_DIR: /app/models
    volumes:
      - ml_models:/app/models
    restart: unless-stopped

  collector:
    build: .
    command: ["node", "dist/index.js", "collect", "start"]
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_TYPE: postgres
      DATABASE_URL: postgres://vizzor:vizzor_secure_pass@postgres:5432/vizzor
    restart: unless-stopped

  n8n:
    image: n8nio/n8n:latest
    ports:
      - "5678:5678"
    depends_on:
      - vizzor-api
      - ml-sidecar
    environment:
      N8N_DEFAULT_BINARY_DATA_MODE: filesystem
      VIZZOR_API_URL: http://vizzor-api:3000
      ML_SIDECAR_URL: http://ml-sidecar:8000
      DB_TYPE: postgresdb
      DB_POSTGRESDB_HOST: postgres
      DB_POSTGRESDB_PORT: 5432
      DB_POSTGRESDB_DATABASE: n8n
      DB_POSTGRESDB_USER: vizzor
      DB_POSTGRESDB_PASSWORD: vizzor_secure_pass
      N8N_ENCRYPTION_KEY: "${N8N_ENCRYPTION_KEY:-change-this-encryption-key}"
    volumes:
      - n8n_data:/home/node/.n8n
      - ./n8n/workflows:/home/node/workflows:ro
    restart: unless-stopped

  postgres:
    image: timescale/timescaledb:latest-pg15
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: vizzor
      POSTGRES_USER: vizzor
      POSTGRES_PASSWORD: vizzor_secure_pass
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./src/data/migrations/001-init.sql:/docker-entrypoint-initdb.d/001-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vizzor"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  pg_data:
  n8n_data:
  ml_models:
